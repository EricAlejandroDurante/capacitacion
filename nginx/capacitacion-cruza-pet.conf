# capacitacion.cruza.pet — página estática (capacitación líderes)
# Servida directo por nginx desde /var/www/capacitacion.cruza.pet (sin container).
# SSL: cert wildcard Cloudflare Origin *.cruza.pet en /etc/ssl/cloudflare/.

server {
    listen 80;
    server_name capacitacion.cruza.pet;
    return 301 https://capacitacion.cruza.pet$request_uri;
}

server {
    listen 443 ssl;
    server_name capacitacion.cruza.pet;

    ssl_certificate /etc/ssl/cloudflare/cruza.pet.pem;
    ssl_certificate_key /etc/ssl/cloudflare/cruza.pet.key;

    root /var/www/capacitacion.cruza.pet;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
